# Example workflow consuming the mhelm action.
#
# Layout assumed in the platform repo:
#
#   platform/
#     cert-manager/
#       chart.json
#       chart-lock.json     (generated, committed)
#       image-values.yaml  (generated, committed)
#     cilium/
#       chart.json
#       ...
#
# The matrix mirrors each chart in parallel. Each job:
#   1. Checks out the platform repo.
#   2. Logs in to GHCR (or whichever registry chart.json#downstream.url points at).
#   3. Runs the mhelm composite action, which discovers → verifies → mirrors →
#      cosign-signs + attests every artifact.
#   4. Opens a PR with the updated chart-lock.json / image-values.yaml /
#      mirror-provenance.json — review the digest diff, then merge to record
#      the mirror in git (consistent with drift.yml and the
#      "every change is a reviewable PR" model).

name: Mirror Helm charts

on:
  push:
    branches:
      - main          # only the default branch performs real (signed) mirrors
    paths:
      - 'platform/**/chart.json'
      - '.github/workflows/mirror.yml'
  workflow_dispatch:

# These permissions are required by the mhelm action when sign=true (the default).
permissions:
  contents: write        # create-pull-request pushes the lockfile branch
  pull-requests: write   # ...and opens the PR with the lockfile updates
  packages: write        # push chart + images to ghcr.io
  id-token: write        # cosign keyless via OIDC → Fulcio → Rekor

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - platform/cert-manager
          - platform/cilium
          - platform/rook-ceph
          - platform/rook-ceph-cluster
          - platform/argocd
          - platform/cnpg
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror with mhelm
        id: mhelm
        uses: gilsstudio/mhelm@v0.5.0
        with:
          dir: ${{ matrix.chart }}
          # Set to "true" to fail the job when an upstream image is unsigned.
          strict-verify: 'false'

      - name: Open PR with lockfile updates
        uses: peter-evans/create-pull-request@v6
        with:
          branch: mirror/${{ matrix.chart }}
          title: 'chore(mirror): update lockfile for ${{ matrix.chart }}'
          commit-message: 'chore(mirror): update lockfile for ${{ matrix.chart }}'
          add-paths: |
            ${{ matrix.chart }}/chart-lock.json
            ${{ matrix.chart }}/image-values.yaml
            ${{ matrix.chart }}/mirror-provenance.json
          body: |
            Automated mirror refreshed the pinned digests / downstream refs
            for `${{ matrix.chart }}`.

            Review the `chart-lock.json` diff — every changed digest is a
            real upstream or downstream content change. Merging records the
            mirror operation in git (the lockfile is the source of truth).
