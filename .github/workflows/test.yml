name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

permissions:
  contents: read

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go test -race -count=1 ./...

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # GitHub-hosted runners ship Docker; testcontainers-go auto-detects it.
      - run: go test -tags integration -timeout 10m ./test/integration/...
