# Example workflow consuming the mhelm action.
#
# Layout assumed in the platform repo:
#
#   platform/
#     cert-manager/
#       chart.json
#       chart-lock.json     (generated, committed)
#       mirror-values.yaml  (generated, committed)
#     cilium/
#       chart.json
#       ...
#
# The matrix mirrors each chart in parallel. Each job:
#   1. Checks out the platform repo.
#   2. Logs in to GHCR (or whichever registry chart.json#downstream.url points at).
#   3. Runs the mhelm composite action, which discovers → verifies → mirrors →
#      cosign-signs + attests every artifact.
#   4. Optionally commits updated chart-lock.json / mirror-values.yaml /
#      mirror-provenance.json back to the repo as a PR.

name: Mirror Helm charts

on:
  push:
    paths:
      - 'platform/**/chart.json'
      - '.github/workflows/mirror.yml'
  workflow_dispatch:

# These permissions are required by the mhelm action when sign=true (the default).
permissions:
  contents: write   # so the optional "commit lockfile updates" step can push
  packages: write   # push to ghcr.io
  id-token: write   # cosign keyless via OIDC → Fulcio → Rekor

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - platform/cert-manager
          - platform/cilium
          - platform/rook-ceph
          - platform/rook-ceph-cluster
          - platform/argocd
          - platform/cnpg
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror with mhelm
        id: mhelm
        uses: gilsstudio/mhelm@v1
        with:
          dir: ${{ matrix.chart }}
          # Set to "true" to fail the job when an upstream image is unsigned.
          strict-verify: 'false'

      - name: Commit lockfile updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: |
            ${{ matrix.chart }}/chart-lock.json
            ${{ matrix.chart }}/mirror-values.yaml
            ${{ matrix.chart }}/mirror-provenance.json
          commit_message: 'chore(mirror): update lockfile for ${{ matrix.chart }}'
