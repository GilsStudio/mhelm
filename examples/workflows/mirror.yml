# Example workflow consuming the mhelm action.
#
# Layout assumed in the platform repo:
#
#   platform/
#     cert-manager/
#       chart.json
#       chart-lock.json     (generated, committed by the action)
#       image-values.yaml  (generated, committed by the action)
#     cilium/
#       chart.json
#       ...
#
# The matrix mirrors each chart in parallel. Each job:
#   1. Checks out the platform repo (actions/checkout's default
#      persist-credentials leaves a push-capable token in place).
#   2. Logs in to GHCR (or whichever registry chart.json#downstream.url points at).
#   3. Runs the mhelm composite action, which discovers → verifies → mirrors →
#      wraps → cosign-signs + attests every artifact, then COMMITS the updated
#      chart-lock.json / image-values.yaml straight back to this branch
#      (commit input, default true; the message carries [skip ci] so the
#      lockfile commit does not re-trigger this workflow). The committed
#      lockfile diff IS the mirror record.
#
# As of mhelm v0.7.0 the action owns the lockfile commit. Do NOT also add a
# create-pull-request / git commit step — that double-commits. To keep a
# PR-review flow instead of direct-to-branch, set `commit: 'false'` on the
# action and add your own create-pull-request step (and restore
# `pull-requests: write`).

name: Mirror Helm charts

on:
  push:
    branches:
      - main          # only the default branch performs real (signed) mirrors
    paths:
      - 'platform/**/chart.json'
      - '.github/workflows/mirror.yml'
  workflow_dispatch:

# Permissions required by the mhelm action when sign=true and commit=true
# (both default).
permissions:
  contents: write        # mhelm commit-lock pushes the lockfile to this branch
  packages: write        # push chart + images to ghcr.io
  id-token: write        # cosign keyless via OIDC → Fulcio → Rekor

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - platform/cert-manager
          - platform/cilium
          - platform/rook-ceph
          - platform/rook-ceph-cluster
          - platform/argocd
          - platform/cnpg
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so commit-lock's `git pull --rebase --autostash`
          # before push rebases cleanly against a concurrent push.
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror with mhelm
        id: mhelm
        uses: gilsstudio/mhelm@v0.8.0
        with:
          dir: ${{ matrix.chart }}
          # Set to "true" to fail the job when an upstream image is unsigned.
          strict-verify: 'false'
          # commit: 'true' is the default — the action commits the updated
          # chart-lock.json / image-values.yaml back to this branch.
